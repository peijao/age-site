  <title>AGE Invest — Մենք պարզապես կառուցում ենք ձեր նոր տունը</title>

  <!-- Скрипт для установки темы до загрузки React -->
  <script>
    (function() {
      try {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
          document.documentElement.classList.remove('light');
        } else if (theme === 'light') {
          document.documentElement.classList.add('light');
          document.documentElement.classList.remove('dark');
        } else {
          // По умолчанию ставим тёмную тему
          document.documentElement.classList.add('dark');
          document.documentElement.classList.remove('light');
          localStorage.setItem('theme', 'dark');
        }
      } catch(e) {
        // fallback на тёмную тему при ошибке
        document.documentElement.classList.add('dark');
        document.documentElement.classList.remove('light');
      }
    })();
  </script>

  <style>
    /* Можно добавить базовые стили для body на случай если классы ещё не применились */
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      transition: background-color 0.5s ease, color 0.5s ease;
    }

    /* Фон по умолчанию (тёмный) */
    html.dark body {
      background-color: #111827;
      color: #d1d5db;
    }
    html.light body {
      background-color: #ffffff;
      color: #1f2937;
    }
  </style>
